<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarô Mitológico Grego</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Pinyon+Script&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede6d6;
    --gold: #b8943a;
    --gold-light: #d4b46a;
    --gold-pale: #e8d5a0;
    --gold-faint: #f2e8cc;
    --brown: #7a5c2e;
    --text-dark: #3a2e1e;
    --text-mid: #6b5535;
    --text-muted: #9a8260;
    --text-faint: #c4ae88;
    --border-mid: rgba(184,148,58,0.4);
  }

  html, body {
    min-height: 100%;
    background: var(--cream);
    color: var(--text-dark);
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  body {
    background:
      radial-gradient(ellipse at 10% 10%, rgba(212,180,106,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 90%, rgba(184,148,58,0.12) 0%, transparent 50%),
      #f5f0e8;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  .bg-symbols {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-sym {
    position: absolute;
    color: var(--gold-pale);
    font-size: var(--sz, 14px);
    opacity: var(--op, 0.4);
    transform: rotate(var(--rot, 0deg));
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 740px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 4rem;
    text-align: center;
  }

  .header { margin-bottom: 2rem; animation: fadeDown 1s ease both; }

  .header-deco {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 0.8rem;
  }

  .deco-line {
    flex: 1;
    max-width: 90px;
    height: 0.5px;
    background: linear-gradient(to right, transparent, var(--gold-light));
  }
  .deco-line.r { background: linear-gradient(to left, transparent, var(--gold-light)); }

  .deco-stars { color: var(--gold-light); font-size: 13px; letter-spacing: 5px; }

  h1 {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(2.4rem, 6vw, 3.4rem);
    font-weight: 400;
    color: var(--brown);
    line-height: 1.15;
  }

  .subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }

  .instruction {
    font-size: 1.05rem;
    color: var(--text-mid);
    font-style: italic;
    margin-bottom: 1.8rem;
    line-height: 1.7;
    animation: fadeIn 1s ease both 0.4s;
  }

  .btn-wrap { animation: fadeIn 1s ease both 0.6s; margin-bottom: 2rem; }

  .btn-shuffle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    letter-spacing: 0.22em;
    color: var(--brown);
    background: transparent;
    border: 0.5px solid var(--gold-light);
    padding: 11px 38px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.3s ease;
    position: relative;
  }

  .btn-shuffle::before, .btn-shuffle::after {
    content: '✦';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold-light);
    font-size: 10px;
  }
  .btn-shuffle::before { left: 14px; }
  .btn-shuffle::after { right: 14px; }

  .btn-shuffle:hover { background: var(--gold-faint); border-color: var(--gold); }
  .btn-shuffle:active { transform: scale(0.98); }
  .btn-shuffle:disabled { opacity: 0.4; cursor: not-allowed; }

  .shuffle-dots {
    display: none;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1.5rem;
    align-items: center;
    height: 20px;
  }
  .shuffle-dots.active { display: flex; }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold-light);
    animation: dotBounce 0.7s infinite alternate;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotBounce {
    from { transform: translateY(0); opacity: 0.4; }
    to { transform: translateY(-8px); opacity: 1; }
  }

  .cards-row {
    display: flex;
    gap: 18px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    animation: fadeIn 0.8s ease both 0.7s;
  }

  .card-slot { width: 170px; }

  .pos-label {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--text-faint);
    margin-bottom: 10px;
    letter-spacing: 0.08em;
  }

  .card-flip {
    width: 170px;
    height: 260px;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 5px;
    overflow: hidden;
  }

  .card-back {
    background: var(--cream-dark);
    border: 0.5px solid var(--border-mid);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-front {
    transform: rotateY(180deg);
    background: #fdfaf4;
    border: 0.5px solid var(--border-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 10px 12px;
  }

  .card-front.reversed-card { border-color: rgba(160,100,80,0.4); }

  .card-num {
    font-family: 'IM Fell English', serif;
    font-size: 0.65rem;
    color: var(--text-faint);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }

  .card-symbol { font-size: 36px; line-height: 1; margin-bottom: 8px; }

  .card-name {
    font-family: 'Pinyon Script', cursive;
    font-size: 1.3rem;
    color: var(--brown);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 2px;
  }

  .card-deity {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .card-divider {
    width: 32px;
    height: 0.5px;
    background: var(--border-mid);
    margin-bottom: 9px;
  }

  .card-meaning {
    font-size: 0.76rem;
    color: var(--text-mid);
    text-align: center;
    line-height: 1.6;
    flex: 1;
    font-style: italic;
  }

  .tag-reversed {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.65rem;
    color: #a06050;
    margin-top: 8px;
    padding: 3px 10px;
    border: 0.5px solid rgba(160,96,80,0.3);
    border-radius: 1px;
  }

  .card-flip:not(.done):hover .card-back {
    border-color: var(--gold-light);
    background: var(--gold-faint);
  }

  .hint {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--text-mid);
    margin-top: 10px;
    min-height: 1.4em;
    letter-spacing: 0.02em;
  }

  .footer-ornament {
    margin-top: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0.5;
  }

  .footer-line { flex: 1; max-width: 100px; height: 0.5px; background: var(--gold-light); }
  .footer-glyph { color: var(--gold-light); font-size: 12px; letter-spacing: 5px; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (max-width: 580px) {
    .card-slot { width: 145px; }
    .card-flip { width: 145px; height: 220px; }
    .cards-row { gap: 10px; }
    .card-symbol { font-size: 28px; }
    .card-name { font-size: 1.05rem; }
    .card-meaning { font-size: 0.72rem; }
  }
</style>
</head>
<body>

<div class="bg-symbols" id="bgSyms"></div>

<div class="container">
  <header class="header">
    <div class="header-deco">
      <div class="deco-line"></div>
      <div class="deco-stars">⭐ 🌙 ☀️</div>
      <div class="deco-line r"></div>
    </div>
    <h1>O que preciso me atentar hoje</h1>
  </header>

  <p class="instruction">Mentalize sua questão com clareza.<br>Quando sentir que é a hora, embaralhe.</p>

  <div class="btn-wrap">
    <button class="btn-shuffle" id="btnShuffle" onclick="shuffle()">Embaralhar</button>
    <p class="hint" id="hint">Clique em uma carta para revelar</p>
  </div>

  <div class="shuffle-dots" id="shuffleDots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="cards-row">
    <div class="card-slot">
      <div class="pos-label">Passado</div>
      <div class="card-flip" id="flip0" onclick="flip(0)">
        <div class="card-inner" id="inner0">
          <div class="card-face card-back" id="back0">
            <div style="font-size: 52px; opacity: 0.85;">⭐</div>
          </div>
          <div class="card-face card-front" id="front0"></div>
        </div>
      </div>
    </div>

    <div class="card-slot">
      <div class="pos-label">Presente</div>
      <div class="card-flip" id="flip1" onclick="flip(1)">
        <div class="card-inner" id="inner1">
          <div class="card-face card-back" id="back1">
            <div style="font-size: 52px; opacity: 0.85;">🌙</div>
          </div>
          <div class="card-face card-front" id="front1"></div>
        </div>
      </div>
    </div>

    <div class="card-slot">
      <div class="pos-label">Futuro</div>
      <div class="card-flip" id="flip2" onclick="flip(2)">
        <div class="card-inner" id="inner2">
          <div class="card-face card-back" id="back2">
            <div style="font-size: 52px; opacity: 0.85;">☀️</div>
          </div>
          <div class="card-face card-front" id="front2"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-ornament">
    <div class="footer-line"></div>
    <div class="footer-glyph">✦ ✦ ✦</div>
    <div class="footer-line"></div>
  </div>
</div>

<script>
const syms = ['✦','☽','✧','⊕','◇','✺'];
const bgEl = document.getElementById('bgSyms');
for (let i = 0; i < 24; i++) {
  const el = document.createElement('div');
  el.className = 'bg-sym';
  el.textContent = syms[Math.floor(Math.random() * syms.length)];
  el.style.cssText = `top:${Math.random()*100}%;left:${Math.random()*100}%;--sz:${Math.floor(Math.random()*10+8)}px;--op:${(Math.random()*0.2+0.06).toFixed(2)};--rot:${Math.floor(Math.random()*60-30)}deg;`;
  bgEl.appendChild(el);
}

const arcanos = [
  { num:"0", name:"O Louco", deity:"Dionísio", symbol:"🌊", meaning:"Novos começos, espontaneidade e abertura para o desconhecido. Um salto de fé." },
  { num:"I", name:"O Mago", deity:"Hermes", symbol:"⚡", meaning:"Vontade, habilidade e poder de manifestar. Os recursos estão em suas mãos." },
  { num:"II", name:"A Sacerdotisa", deity:"Perséfone", symbol:"🌙", meaning:"Intuição, mistério e sabedoria interior. Confie nos seus sonhos e presságios." },
  { num:"III", name:"A Imperatriz", deity:"Deméter", symbol:"🌿", meaning:"Abundância, fertilidade e amor materno. Um ciclo de criação e nutrição." },
  { num:"IV", name:"O Imperador", deity:"Zeus", symbol:"⚜️", meaning:"Autoridade, estrutura e poder. Momento de estabelecer bases sólidas." },
  { num:"V", name:"O Hierofante", deity:"Quíron", symbol:"🏛️", meaning:"Tradição, ensinamento e caminho espiritual. Busque um guia ou mentoria." },
  { num:"VI", name:"Os Enamorados", deity:"Eros & Psiquê", symbol:"✨", meaning:"União, escolha e alinhamento com seus valores mais profundos." },
  { num:"VII", name:"O Carro", deity:"Ares", symbol:"🔱", meaning:"Determinação, controle e vitória. Direcione sua força com propósito." },
  { num:"VIII", name:"A Força", deity:"Héracles", symbol:"🦁", meaning:"Coragem interior, paciência e compaixão. A força real vem de dentro." },
  { num:"IX", name:"O Eremita", deity:"Cronos", symbol:"🕯️", meaning:"Recolhimento, busca interior e sabedoria. É hora de olhar para dentro." },
  { num:"X", name:"Roda da Fortuna", deity:"Moiras", symbol:"☯️", meaning:"Ciclos, destino e mudança inevitável. Uma nova fase se inicia." },
  { num:"XI", name:"A Justiça", deity:"Atena", symbol:"⚖️", meaning:"Equilíbrio, verdade e responsabilidade. As ações têm consequências justas." },
  { num:"XII", name:"O Enforcado", deity:"Prometeu", symbol:"🌀", meaning:"Sacrifício, suspensão e nova perspectiva. Entregue-se para ganhar clareza." },
  { num:"XIII", name:"A Morte", deity:"Hades", symbol:"🌑", meaning:"Transformação profunda e encerramento de ciclos. Um renascimento se aproxima." },
  { num:"XIV", name:"A Temperança", deity:"Íris", symbol:"🌈", meaning:"Moderação, equilíbrio e harmonia. Integre os opostos com paciência." },
  { num:"XV", name:"O Diabo", deity:"Pan", symbol:"🔗", meaning:"Apegos, ilusões e sombra. O que te prende ainda pode ser libertado." },
  { num:"XVI", name:"A Torre", deity:"Posêidon", symbol:"⚡", meaning:"Ruptura súbita e revelação. O que cai precisava cair para liberar o novo." },
  { num:"XVII", name:"A Estrela", deity:"Afrodite", symbol:"⭐", meaning:"Esperança, renovação e beleza. Você é guiada por uma luz mais alta." },
  { num:"XVIII", name:"A Lua", deity:"Ártemis", symbol:"🌕", meaning:"Inconsciente, medos e ciclos lunares. Nem tudo é o que parece ser." },
  { num:"XIX", name:"O Sol", deity:"Apolo", symbol:"☀️", meaning:"Alegria, clareza e sucesso. Um período luminoso e de grande vitalidade." },
  { num:"XX", name:"O Julgamento", deity:"Hermes Psicopompo", symbol:"🕊️", meaning:"Chamado, despertar e absolvição. É hora de responder ao chamado da alma." },
  { num:"XXI", name:"O Mundo", deity:"Gaia", symbol:"🌍", meaning:"Completude, integração e realização plena. Um ciclo se encerra com maestria." }
];

let drawn=[], flipped=[false,false,false], shuffled=false;

function shuffle() {
  const btn=document.getElementById('btnShuffle');
  const dots=document.getElementById('shuffleDots');
  btn.disabled=true; dots.classList.add('active');
  shuffled=false; flipped=[false,false,false];
  [0,1,2].forEach(i=>{
    document.getElementById('inner'+i).classList.remove('flipped');
    document.getElementById('flip'+i).classList.remove('done');
  });
  document.getElementById('hint').textContent='Os deuses estão embaralhando...';
  setTimeout(()=>{
    const pool=[...arcanos]; drawn=[];
    while(drawn.length<3){
      const idx=Math.floor(Math.random()*pool.length);
      const card={...pool[idx]}; card.reversed=Math.random()<0.3;
      drawn.push(card); pool.splice(idx,1);
    }
    const posIcons = ['⭐', '🌙', '☀️'];

drawn.forEach((card,i)=>{
      const front=document.getElementById('front'+i);
      front.className='card-face card-front'+(card.reversed?' reversed-card':'');
      front.innerHTML=`
        <div class="card-num">${card.num}</div>
        <div class="card-symbol">${card.symbol}</div>
        <div class="card-name">${card.name}</div>
        <div class="card-deity">${card.deity}</div>
        <div class="card-divider"></div>
        <div class="card-meaning">${card.meaning}</div>
        ${card.reversed?'<div class="tag-reversed">↓ invertida</div>':''}
      `;

      // Update back face with position icon
      document.getElementById('back'+i).innerHTML = `
        <div style="font-size: 52px; opacity: 0.85;">${posIcons[i]}</div>
      `;
    });
    dots.classList.remove('active'); btn.disabled=false; shuffled=true;
    document.getElementById('hint').textContent='Clique em cada carta para revelar';
  },1500);
}

function flip(i){
  if(!shuffled||flipped[i]) return;
  flipped[i]=true;
  document.getElementById('inner'+i).classList.add('flipped');
  document.getElementById('flip'+i).classList.add('done');
  if(flipped.every(Boolean)) document.getElementById('hint').textContent='Embaralhe novamente para uma nova tiragem';
}
</script>
</body>
</html>
